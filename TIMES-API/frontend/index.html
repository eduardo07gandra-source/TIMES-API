<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão Explorer ⚽</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🏆 Brasileirão</h1>
    <p class="subtitle">Explore os times do Brasil</p>

    <div class="selecao-area">
        <img id="time-image" src="" alt="">
        <h2 id="timeName"></h2>

        <p id="infoEstadio"></p>
        <p id="infoFundacao"></p>
        <p id="infoRegiao"></p>
    </div>

    <div class="controls">
        <button id="randomBtn">Time Aleatório</button>
    </div>

    <div class="search">
        <input type="text" id="timeInput" placeholder="Digite o nome do time">
        <button id="searchBtn">Buscar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
